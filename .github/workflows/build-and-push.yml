# Build and push the worker image to GHCR.
#
# Trigger paths:
#   1. Tag push (vX.Y.Z) — normal release flow once v1.0.0 exists.
#   2. workflow_dispatch — used for the initial v1.0.0 build AND for ad-hoc
#      republish of a specific version without a tag bump.
#
# Disk-space approach:
#   The image is ~38 GB and GHA's default ubuntu-latest runner has ~14 GB
#   free, which would normally make this build impossible on GHA. The
#   easimon/maximize-build-space action removes preinstalled toolchains we
#   don't need (~46 GB of dotnet/android/haskell/codeql/docker images),
#   taking the runner to ~60 GB free — enough for the no-cache initial
#   build. Subsequent builds re-use the type=gha layer cache and run much
#   faster.

name: build-and-push

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to publish (no leading v, e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350         # GHA hard cap is 360 (6h); leave margin
    permissions:
      contents: read
      packages: write
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          # Mount the freed space AT /var/lib/docker so Docker's data-root
          # actually gets the ~60 GB. The action's default mount path is
          # /mnt/build, which leaves Docker stuck on the ~14 GB root volume
          # and causes "no space left on device" during the build's first
          # layer extraction. The action handles stopping docker, moving
          # the data, mounting the new volume here, and restarting docker.
          build-mount-path: '/var/lib/docker'
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: meta
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/yascc/tofui-wan-longform-worker:v${{ steps.meta.outputs.version }}
            ghcr.io/yascc/tofui-wan-longform-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
